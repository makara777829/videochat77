<!DOCTYPE html>
<html>
<head>
    <title>Video Chat</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <div id="video-container">
        <div id="user-1" class="video-player"></div>
        <div id="user-2" class="video-player"></div>
    </div>

    <div class="buttons">
        <button id="join-btn">Start Chat</button>
        <button id="leave-btn">End Chat</button>
    </div>

    <!-- This links the Agora Video Engine -->
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
    <script src="main.js"></script>
</body>
</html>
